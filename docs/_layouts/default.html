<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; color: #111; }
      header { margin-bottom: 1rem }
      .post { border-bottom: 1px solid #eee; padding: 0.75rem 0 }
      .filters { margin: 0.5rem 0 1rem }
      .filters button { margin-right: 0.5rem }
    </style>
  </head>
  <body>
    <header>
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <small>Generated by Jekyll — source in repo</small>
    </footer>
  </body>
</html>
