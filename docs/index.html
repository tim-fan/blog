---
layout: default
title: Home
---

<div id="feed"></div>

<script>
async function load() {
  const res = await fetch('{{ "/posts.json" | relative_url }}');
  const allPosts = await res.json();  // already newest-first from Jekyll
  const feed = document.getElementById('feed');
  const catNav       = document.getElementById('cat-nav');
  const mobileCatNav = document.getElementById('mobile-cat-nav');

  // ── state (initialised from URL hash) ───────────────────
  function parseHash() {
    const params = new URLSearchParams(window.location.hash.slice(1));
    return {
      project: params.get('project') || null,
      sort:    params.get('sort') === 'oldest' ? 'oldest' : 'newest',
    };
  }

  function setHash(state) {
    const params = new URLSearchParams();
    if (state.project) params.set('project', state.project);
    if (state.sort === 'oldest') params.set('sort', 'oldest');
    const str = params.toString();
    history.replaceState(null, '', str ? '#' + str : window.location.pathname + window.location.search);
  }

  let state = parseHash();

  // ── sidebar + mobile filter: category links ──────────────
  const cats = Array.from(new Set(allPosts.flatMap(p => p.categories || []))).sort();

  function setActiveLinks(project) {
    catNav.querySelectorAll('a').forEach(a => {
      const matches = project
        ? a.textContent === project.replace(/_/g, ' ')
        : a.textContent === 'All posts';
      a.classList.toggle('active', matches);
    });
    mobileCatNav.querySelectorAll('a').forEach(a => {
      const matches = project
        ? a.textContent === project.replace(/_/g, ' ')
        : a.textContent === 'All posts';
      a.classList.toggle('active', matches);
    });
  }

  function makeLink(label, project, nav) {
    const a = document.createElement('a');
    a.href = '#';
    a.textContent = label;
    a.onclick = e => {
      e.preventDefault();
      state = { ...state, project };
      setHash(state);
      setActiveLinks(project);
      if (document.getElementById('mobile-filter').open) {
        document.getElementById('mobile-filter').open = false;
      }
      renderCurrent();
    };
    nav.appendChild(a);
    return a;
  }

  makeLink('All posts', null, catNav);
  makeLink('All posts', null, mobileCatNav);

  cats.forEach(c => {
    const label = c.replace(/_/g, ' ');
    makeLink(label, c, catNav);
    makeLink(label, c, mobileCatNav);
  });

  // set initial active link
  setActiveLinks(state.project);

  // ── sort toggle ──────────────────────────────────────────
  const sortBar = document.createElement('div');
  sortBar.className = 'sort-bar';
  sortBar.appendChild(Object.assign(document.createElement('span'), { textContent: 'Sort: ' }));

  ['newest', 'oldest'].forEach((val, i) => {
    const btn = document.createElement('button');
    btn.textContent = val === 'newest' ? 'Newest first' : 'Oldest first';
    btn.className = 'sort-btn' + (state.sort === val ? ' active' : '');
    btn.onclick = () => {
      state = { ...state, sort: val };
      setHash(state);
      sortBar.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCurrent();
    };
    sortBar.appendChild(btn);
  });

  feed.before(sortBar);

  // ── render ───────────────────────────────────────────────
  function renderCurrent() {
    let items = state.project
      ? allPosts.filter(p => (p.categories || []).includes(state.project))
      : allPosts.slice();
    if (state.sort === 'oldest') items = items.slice().reverse();

    feed.innerHTML = '';

    items.forEach(p => {
      const article = document.createElement('article');
      article.className = 'post';
      article.innerHTML = `
        <h2><a href="${p.url}">${p.title}</a></h2>
        <div class="post-meta">${p.date}${p.categories && p.categories.length ? ' &middot; ' + p.categories.map(c => c.replace(/_/g, ' ')).join(', ') : ''}</div>
        <div class="post-content">${p.content}</div>
      `;
      feed.appendChild(article);
    });
  }

  // re-apply state if hash changes (browser back/forward)
  window.addEventListener('hashchange', () => {
    state = parseHash();
    setActiveLinks(state.project);
    // sync sort buttons
    sortBar.querySelectorAll('.sort-btn').forEach(btn => {
      btn.classList.toggle('active',
        (btn.textContent === 'Newest first' && state.sort === 'newest') ||
        (btn.textContent === 'Oldest first' && state.sort === 'oldest'));
    });
    renderCurrent();
  });

  renderCurrent();
}

load().catch(err => {
  console.error(err);
  document.getElementById('feed').textContent = 'Failed to load posts.';
});
</script>
